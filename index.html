<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Student Assessment Dashboard</title>
    <!-- EmailJS CDN for email functionality -->
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body>
    <div id="dashboard">
        <!-- Existing dashboard content -->
    </div>

    <!-- Email Configuration Modal -->
    <div id="emailModal" style="display:none;">
        <h2>Send Email</h2>
        <label for="recipient">Select Recipient:</label>
        <select id="recipient"></select>
        <button id="sendEmailBtn">Send Email</button>
        <button id="closeModalBtn">Close</button>
    </div>

    <script>
        // Predefined email addresses stored in localStorage
        const emailAddresses = JSON.parse(localStorage.getItem('emailAddresses')) || [];

        const populateRecipients = () => {
            const recipientSelect = document.getElementById('recipient');
            recipientSelect.innerHTML = '';
            emailAddresses.forEach(email => {
                const option = document.createElement('option');
                option.value = email;
                option.textContent = email;
                recipientSelect.appendChild(option);
            });
        };

        const sendEmail = () => {
            const selectedRecipient = document.getElementById('recipient').value;
            const templateParams = {
                to_email: selectedRecipient,
                message: "Here is your HTML report...",
            };
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(response => {
                    alert('Email sent successfully!');
                }, error => {
                    alert('Failed to send email: ' + error); 
                });
        };

        document.getElementById('sendEmailBtn').addEventListener('click', sendEmail);

        // Populate recipients on load
        populateRecipients();

        // Adding event listeners for dropdown menu
        document.querySelector('#downloadBtn').innerHTML += '<option>Email</option>';
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('emailModal').style.display = 'none';
        });

        // Function to show email modal
        const showEmailModal = () => {
            document.getElementById('emailModal').style.display = 'block';
        };

        // Assuming you have a button to call this function
        // add your button listener to call showEmailModal

    </script>
    <style>
        /* Styles for the email dialog and toast notifications */
        #emailModal { 
            background: white;
            border: 1px solid black;
            padding: 20px;
            border-radius: 5px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        /* Additional styles for toast notifications */
    </style>
</body>
</html>
